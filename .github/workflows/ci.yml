name: CI

on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:

jobs:
  lint:
    name: Check code quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Check code
        run: make lint
      - name: Check docs
        run: make docs_build

  linux:
    name: "Linux: ${{ matrix.target }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, i686]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -i 3.9 3.10 3.11 3.12 3.13 3.13t 3.14 3.14t pypy3.11
          sccache: "true"
          manylinux: auto
      - name: Install and test
        if: matrix.target == 'x86_64'
        run: |
          pip install uuid_utils --no-index --find-links dist --force-reinstall
          pip install pytest pytest-codspeed
          pytest -v .
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-${{ strategy.job-index }}
          path: dist

  linux-cross:
    name: "Linux: ${{ matrix.target }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [aarch64, armv7, ppc64le]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          rust-toolchain: stable
          target: ${{ matrix.target }}
          manylinux: auto
          args: --release --out dist -i 3.9 3.10 3.11 3.12 3.13 3.13t 3.14 3.14t pypy3.11
      - uses: uraimo/run-on-arch-action@v3.0.1
        if: matrix.target != 'ppc64'
        name: Install built wheel
        with:
          arch: ${{ matrix.target }}
          distro: ubuntu22.04
          githubToken: ${{ github.token }}
          install: |
            apt-get update
            apt-get install -y --no-install-recommends python3 python3-pip
            pip install pytest
          run: |
            pip install uuid_utils --no-index --find-links dist/ --force-reinstall
            pytest -v .
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-cross-${{ strategy.job-index }}
          path: dist

  musllinux:
    name: "Linux: ${{ matrix.target }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - i686-unknown-linux-musl
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
          architecture: x64
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          rust-toolchain: stable
          target: ${{ matrix.target }}
          manylinux: musllinux_1_2
          args: --release --out dist -i 3.9 3.10 3.11 3.12 3.13 3.13t 3.14 3.14t
      - name: Install built wheel
        if: matrix.target == 'x86_64-unknown-linux-musl'
        uses: addnab/docker-run-action@v3
        with:
          image: alpine:latest
          options: -v ${{ github.workspace }}:/io -w /io
          run: |
            apk add py3-pip
            pip3 install -U pip pytest
            pip3 install uuid_utils --no-index --find-links /io/dist/ --force-reinstall --break-system-packages
            python3 -c "import uuid_utils"
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-musllinux-${{ strategy.job-index }}
          path: dist

  musllinux-cross:
    name: "Linux: ${{ matrix.platform.target }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform:
          - target: aarch64-unknown-linux-musl
            arch: aarch64
          - target: armv7-unknown-linux-musleabihf
            arch: armv7
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          rust-toolchain: stable
          target: ${{ matrix.platform.target }}
          manylinux: musllinux_1_2
          args: --release --out dist -i 3.9 3.10 3.11 3.12 3.13 3.13t 3.14 3.14t
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-musllinux-cross-${{ strategy.job-index }}
          path: dist

  windows:
    name: "Windows: ${{ matrix.platform.target }}"
    runs-on: "${{ matrix.platform.os }}"
    strategy:
      matrix:
        platform:
          - target: x64
            os: windows-latest
            py_arch: "x64"
            interpreter: 3.9 3.10 3.11 3.12 3.13 3.14 pypy3.11
          - target: x86
            py_arch: "x86"
            os: windows-latest
            interpreter: 3.9 3.10 3.11 3.12 3.13 3.14
          - target: aarch64
            py_arch: "arm64"
            os: windows-11-arm
            interpreter: "3.11 3.12 3.13 3.14"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
          architecture: ${{ matrix.platform.py_arch }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i ${{ matrix.platform.interpreter }}
          sccache: "true"
      - name: Install and test uuid_utils
        run: |
          pip install uuid_utils --no-index --find-links dist --force-reinstall
          pip install pytest pytest-codspeed
          pytest -v .
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-windows-${{ strategy.job-index }}
          path: dist

  # https://github.com/python/cpython/issues/127294
  windows-freethreading:
    name: "Windows: free-threading ${{ matrix.platform.target }}"
    runs-on: "${{ matrix.platform.os }}"
    strategy:
      matrix:
        platform:
          - target: x64
            os: windows-latest
            py_arch: "x64"
            interpreter: 3.13t 3.14t
          - target: x86
            os: windows-latest
            py_arch: "x86"
            interpreter: 3.13t 3.14t
          - target: aarch64
            os: windows-11-arm
            py_arch: "arm64"
            interpreter: 3.14t
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python 3.13t
        if: matrix.platform.target != 'aarch64'
        uses: actions/setup-python@v6
        with:
          python-version: "3.13t"
          architecture: ${{ matrix.platform.py_arch }}
      - name: Set up Python 3.14t
        uses: actions/setup-python@v6
        with:
          python-version: "3.14t"
          architecture: ${{ matrix.platform.py_arch }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i ${{ matrix.platform.interpreter }}
          sccache: "true"
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-freethreaded-${{ strategy.job-index }}
          path: dist

  macos:
    name: "MacOS"
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - uses: dtolnay/rust-toolchain@stable
      - name: Build wheels - x86_64
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: --release --out dist -i 3.9 3.10 3.11 3.12 3.13 3.13t 3.14 3.14t pypy3.11
          sccache: "true"
      - name: Build wheels - universal2
        uses: PyO3/maturin-action@v1
        with:
          target: universal2-apple-darwin
          args: --release --out dist -i 3.9 3.10 3.11 3.12 3.13 3.13t 3.14 3.14t pypy3.11
      - name: Install and test uuid_utils
        run: |
          pip install uuid_utils --no-index --find-links dist --force-reinstall
          pip install pytest pytest-codspeed
          pytest -v .
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-macos-${{ strategy.job-index }}
          path: dist

  sdist:
    name: Source Distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: wheels-sdist
          path: dist

  pyodide:
    name: Pyodide
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-02-17
          components: rust-src
          targets: wasm32-unknown-emscripten

      - uses: Swatinem/rust-cache@v2

      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: "3.1.58"
          actions-cache-folder: emsdk-cache

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build WASM wheel
        run: |
          uv tool install maturin
          PYO3_CROSS_PYTHON_VERSION=3.12 maturin build --release --target wasm32-unknown-emscripten --out dist -i 3.12

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Node deps
        run: npm install

      - name: Run Pyodide tests
        run: node tests/emscripten_runner.js

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-wasm
          path: dist

  release:
    name: Release
    runs-on: ubuntu-latest
    if: "startsWith(github.ref, 'refs/tags/')"
    permissions:
      id-token: write
      contents: write
      attestations: write
    needs:
      [
        lint,
        linux,
        linux-cross,
        musllinux,
        musllinux-cross,
        windows,
        windows-freethreading,
        macos,
        sdist,
        pyodide,
      ]
    steps:
      - uses: actions/download-artifact@v8
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "wheels-*/*"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Publish to PyPI
        run: uv publish 'wheels-*/*'

  docs:
    name: Publish docs
    runs-on: ubuntu-latest
    if: "startsWith(github.ref, 'refs/tags/')"
    needs: [release]
    steps:
      - uses: actions/checkout@v6
      - name: Build and publish docs
        run: |
          pip install -r requirements.txt
          make docs_build && make docs_deploy
